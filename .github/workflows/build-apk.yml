name: Build Expo APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - run: npm install -g eas-cli

      - run: eas login --token ${{ secrets.EXPO_TOKEN }}

      - run: eas build -p android --profile preview --non-interactive