// Root build.gradle
buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        kotlinVersion = "1.9.22"
    }

    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' } // for any external dependencies
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.2.1")               // Android Gradle Plugin
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion") // Kotlin
        classpath("com.facebook.react:react-native-gradle-plugin")       // RN Plugin
    }
}

// All projects repository config
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

// Apply the React Native root project plugin
apply plugin: "com.facebook.react.rootproject"

// Optional: set root project name (quote if folder has spaces)
rootProject.name = "TKO APP"

// ✅ Plugin Module Configuration
// If you have a plugin module like :gradle-plugin:settings-plugin
// Make sure its build.gradle contains:

// Example plugin module build.gradle (gradle-plugin/settings-plugin/build.gradle)
plugins {
    id 'kotlin' version '1.9.22'
    id 'java-gradle-plugin'
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
}

// If using Android code inside plugin module, also apply AGP
// apply plugin: 'com.android.library'
// And set android { compileSdkVersion, etc. } if needed